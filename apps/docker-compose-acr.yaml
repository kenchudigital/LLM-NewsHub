version: '3.8'

services:
  backend:
    image: ${ALIYUN_REGISTRY:-registry.example.com}/${ALIYUN_NAMESPACE:-llm-newshub}/${ALIYUN_BACKEND_IMAGE:-newsense-backend}:latest
    ports:
      - "8000:8000"
    environment:
      - DEBUG=false
      - ALLOWED_HOSTS=*
    volumes:
      - ./static:/app/static:ro
    env_file:
      - ../.env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    image: ${ALIYUN_REGISTRY:-registry.example.com}/${ALIYUN_NAMESPACE:-llm-newshub}/${ALIYUN_FRONTEND_IMAGE:-newsense-frontend}:latest
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped
    environment:
      - REACT_APP_API_URL=${REACT_APP_API_URL:-http://localhost:8000}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  default:
    name: ai-newssense